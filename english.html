    talent:'Do you ever feel like you\'re the only one who\'s struggling? That\'s because you\'re picking up on signals others can\'t even notice. Someone\'s unspoken pain, a subtle shift in the room — you catch it before anyone else. That sensitivity becomes your greatest power when it goes into something you create.',

let currentQ = 0;
let scores = { EI: [], FT: [], SE: null, SP: null };
const totalQ = questions.length;

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progressLabel').textContent = `Q ${currentQ + 1} / ${totalQ}`;
  document.getElementById('progressFill').style.width = `${((currentQ+1)/totalQ)*100}%`;
  document.getElementById('questionNumber').textContent = `QUESTION ${String(currentQ+1).padStart(2,'0')}`;
  document.getElementById('questionText').textContent = q.text;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    if (opt.soft) {
      btn.className = 'option-btn-c';
      btn.innerHTML = `<span class="option-label-c">${opt.label}</span>${opt.text}`;
    } else {
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-label">${opt.label}</span>${opt.text}`;
    }
    btn.onclick = () => selectOption(opt.value);
    container.appendChild(btn);
  });
  if (currentQ > 0) {
    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.textContent = '← Previous';
    backBtn.onclick = () => goBack();
    container.appendChild(backBtn);
  }
}

function goBack() {
  currentQ--;
  const q = questions[currentQ];
  if (q.axis === 'EI') scores.EI.pop();
  else if (q.axis === 'FT') scores.FT.pop();
  else if (q.axis === 'SE') scores.SE = null;
  else if (q.axis === 'SP') scores.SP = null;
  renderQuestion();
}

function selectOption(value) {
  const q = questions[currentQ];
  if (q.axis === 'EI') scores.EI.push(value);
  else if (q.axis === 'FT') scores.FT.push(value);
  else if (q.axis === 'SE') scores.SE = value;
  else if (q.axis === 'SP') scores.SP = value;
  currentQ++;
  if (currentQ < questions.length) renderQuestion();
  else showResult();
}

function getTypeKey() {
  let eiE = 0, eiI = 0;
  scores.EI.forEach(v => {
    if (v === 'E') eiE += 1;
    else if (v === 'I') eiI += 1;
  });
  let ei = 'B';
  if (eiE > eiI) ei = 'E';
  else if (eiI > eiE) ei = 'I';

  let ftF = 0, ftT = 0;
  scores.FT.forEach(v => {
    if (v === 'F') ftF += 1;
    else if (v === 'T') ftT += 1;
  });
  let ft = 'B';
  if (ftF > ftT) ft = 'F';
  else if (ftT > ftF) ft = 'T';

  if (scores.SE === 'S' && scores.SP === 'T') {
    if (ft === 'T') ft = 'B';
  }
  if (scores.SE === 'S' && scores.SP === 'F') {
    if (ft === 'B') ft = 'F';
  }

  return ei + ft;
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const key = getTypeKey();
  const t = types[key] || types['BB'];

  const answerMap = { 'E':'a', 'I':'b', 'B':'c', 'F':'a', 'T':'b', 'S':'a', 'N':'b' };
  const eiLog = scores.EI.map(v => answerMap[v] || v);
  const ftLog = scores.FT.map(v => answerMap[v] || v);
  const seLog = scores.SE ? answerMap[scores.SE] : '-';
  const spLog = scores.SP ? answerMap[scores.SP] : '-';
  const answerLog = [...eiLog, ...ftLog, seLog, spLog].join('');

  const rs = document.getElementById('resultSection');
  rs.innerHTML = `
    <div class="type-header">
      <img src="${t.imgUrl}" alt="${t.name}" style="width:180px;height:180px;object-fit:contain;display:block;margin:0 auto 16px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.4));">
      <div class="type-name">${t.name}</div>
      <div class="type-axis">${t.axis}</div>
      <div class="catchcopy">"${t.catchcopy}"</div>
      <div style="text-align:center;margin-top:16px;font-family:'Cinzel',serif;font-size:11px;color:rgba(240,234,220,0.3);letter-spacing:2px;">Your answers: ${answerLog}</div>
    </div>
    <div class="section-block">
      <div class="section-title"><span class="section-icon">🌟</span><span class="section-label">YOUR TALENT</span><div class="section-line"></div></div>
      <div class="content-box"><p>${t.talent}</p></div>
    </div>
    <div class="section-block">
      <div class="section-title"><span class="section-icon">✦</span><span class="section-label">WHAT YOU'RE GOOD AT</span><div class="section-line"></div></div>
      <div class="content-box"><ul class="list-items">${t.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>
    </div>
    <div class="section-block">
      <div class="section-title"><span class="section-icon">⚠️</span><span class="section-label">WATCH OUT FOR</span><div class="section-line"></div></div>
      <div class="content-box"><ul class="list-items">${t.pitfalls.map(p=>`<li>${p}</li>`).join('')}</ul></div>
    </div>
    <div class="survey-section">
      <p class="survey-text">Want to go deeper?<br>Try the Japanese version for the full reading.</p>
      <a href="./index.html" style="display:block;margin-bottom:12px;padding:14px;border:1px solid rgba(201,168,76,0.3);color:var(--gold);text-decoration:none;text-align:center;letter-spacing:2px;font-family:'Cinzel',sans-serif;font-size:13px;">← Back to TOP</a>
      <p style="font-size:11px;color:rgba(240,234,220,0.25);font-family:'Cinzel',serif;line-height:1.8;margin-top:16px;">
        ※This reading is for entertainment purposes only and is not a medical or psychological assessment.
      </p>
      <button class="retry-btn" onclick="resetQuiz()">Take the reading again</button>
      <a href="./index.html" style="display:block;margin-top:8px;text-align:center;font-size:11px;color:rgba(240,234,220,0.25);font-family:'Cinzel',serif;letter-spacing:2px;text-decoration:none;">← Back to TOP</a>
    </div>
  `;
  rs.classList.add('show');
}

function resetQuiz() {
  currentQ = 0;
  scores = { EI: [], FT: [], SE: null, SP: null };
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('resultSection').innerHTML = '';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
}

renderQuestion();
</script>
</body>
