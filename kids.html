<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0e1a;
  --text: #f0eadc;
  --gold: #c9a84c;
  --gold-light: #e8d08a;
  --muted: rgba(240,234,220,0.65);
  --card-bg: rgba(255,255,255,0.07);
  --border: rgba(201,168,76,0.3);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d) ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: var(--o); }
  to { opacity: calc(var(--o) * 0.15); }
}
.container {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 48px 20px 80px;
}
.header { text-align: center; margin-bottom: 48px; animation: fadeUp 0.8s ease both; }
.logo {
  font-family: 'Cinzel', serif;
  font-size: clamp(20px, 5vw, 32px);
  color: var(--gold-light);
  letter-spacing: 6px;
  text-shadow: 0 0 40px rgba(201,168,76,0.4);
  margin-bottom: 8px;
}
.tagline {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
}
.kids-badge {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 12px;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
}
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.3;
}
.divider-icon { color: var(--gold); font-size: 16px; opacity: 0.7; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.quiz-section { animation: fadeUp 0.8s ease 0.2s both; }
.progress-bar { margin-bottom: 32px; }
.progress-label {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
  font-family: 'Noto Sans JP', sans-serif;
  margin-bottom: 8px;
  text-align: center;
}
.progress-track { height: 2px; background: rgba(201,168,76,0.15); border-radius: 1px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 1px;
  transition: width 0.5s ease;
}
.question-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 36px 28px;
  margin-bottom: 24px;
}
.question-number {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 16px;
  opacity: 0.8;
}
.question-text { font-size: 18px; line-height: 1.9; margin-bottom: 28px; color: var(--text); }
.options { display: flex; flex-direction: column; gap: 12px; }
.option-btn {
  padding: 14px 20px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;

  transition: all 0.3s;

  width: 100%;
}
.option-btn:hover {
  border-color: rgba(201,168,76,0.7);
  background: rgba(201,168,76,0.08);
  color: var(--gold-light);
}

  background: transparent;
  border-color: rgba(201,168,76,0.3);
  color: var(--text);
}
.option-label {
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  display: block;
  margin-bottom: 4px;
  opacity: 0.8;
}
.option-btn-c {
  padding: 14px 20px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.2);

  text-align: left;

  border-color: rgba(201,168,76,0.5);
  color: rgba(240,234,220,0.8);
}

  color: var(--gold);

.type-header { text-align: center; margin-bottom: 40px; }
.type-emoji { font-size: 48px; display: block; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(201,168,76,0.5)); }
.type-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px, 7vw, 42px);
  color: var(--gold-light);
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(201,168,76,0.4);

.type-axis { font-size: 11px; color: var(--muted); letter-spacing: 3px; font-family: 'Noto Sans JP', sans-serif; margin-bottom: 20px; }
.catchcopy {

  color: var(--gold-light);
  line-height: 1.9;
  padding: 20px 24px;
  border-left: 2px solid rgba(201,168,76,0.5);
  background: rgba(201,168,76,0.06);
  margin: 0 auto;
  max-width: 500px;
  text-align: left;
}
.section-block { margin-bottom: 28px; }
.section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.section-icon { font-size: 18px; }
.section-label { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 3px; }
.section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent); }
.content-box {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-left: 2px solid rgba(201,168,76,0.4);
  padding: 20px 24px;
}
.content-box p { font-size: 15px; line-height: 2.2; color: var(--text); font-weight: 300; }
.list-items { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.list-items li { font-size: 15px; line-height: 1.8; color: var(--text); padding-left: 16px; position: relative; }
.list-items li::before { content: '✦'; position: absolute; left: 0; color: var(--gold); font-size: 10px; top: 4px; opacity: 0.7; }
.parents-box {
  background: rgba(201,168,76,0.05);
  border: 1px solid rgba(201,168,76,0.2);
  border-left: 2px solid rgba(201,168,76,0.6);
  padding: 20px 24px;
  margin-top: 8px;
}
.parents-box p { font-size: 14px; line-height: 2; color: var(--muted); font-weight: 300; }
.parents-label {
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  margin-bottom: 8px;
  opacity: 0.8;
}
.survey-section { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(201,168,76,0.15); }
.survey-text { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 2; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }
.notice-text {
  font-size: 11px;
  color: rgba(240,234,220,0.3);
  font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.8;
  margin-top: 20px;
  text-align: left;
}
.retry-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(240,234,220,0.1);
  color: rgba(240,234,220,0.35);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
}
.retry-btn:hover { border-color: rgba(240,234,220,0.3); color: rgba(240,234,220,0.6); }
.back-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  background: transparent;
  border: 1px solid rgba(240,234,220,0.1);
  color: rgba(240,234,220,0.3);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
}
.back-btn:hover { border-color: rgba(240,234,220,0.25); color: rgba(240,234,220,0.55); }
.footer { text-align: center; margin-top: 60px; font-size: 11px; color: rgba(240,234,220,0.2); letter-spacing: 2px; font-family: 'Noto Sans JP', sans-serif; }
</style>

    talent:'「これで合ってるのかな」——そう何度も自分に聞き続けることはありませんか。実はあなたはすでに答えを持っています。ただ、感覚で得た答えを自分の中で整理できるまで、その答えに気づけないのです。バラバラに見えるものの間につながりを見つけ、誰も気づいていない本当のことを言葉にする——それがアビッソタイプの才能です。',

    pitfalls:['自分の判断に自信が持てず、ぐるぐると考え続けることがある','内側で抱えすぎて誰にも言えなくなることがある','考えすぎて動けなくなることがある'],
    parents:'「それで合ってるよ」と背中を押してあげてください。この子は答えを持っているのに自信が持てません。話を聞いて「あなたの感覚は正しい」と伝えてあげることが、この子の才能を開く方法です。'},
  'BF':{ name:'オーロラ', emoji:'🌌', axis:'両方 × 感情', catchcopy:'予測できないからこそ、人生はあざやかになる。', imgUrl:'https://hatarakutanukichi.github.io/cosmo-type/images/aurora.PNG',
    talent:'気分にムラがあって、周りと温度差を感じることはありませんか。でもオーロラタイプが生み出すものは、他の人を驚かせます。あなたのエネルギーを受けて、周りの人も輝き出す。そのアイデア力は、行き詰まった場面で思わぬひらめきを生み出します。あなたが込めた熱い気持ちとアイデア力で生み出されるものだからこそ、強く人の心を打つのです。',
    strengths:['予測できないアイデアで人を驚かせられる','気持ちの波をエネルギーに変えられる','どんな場所にも自分だけの色を加えられる'],
    pitfalls:['気分屋なところがあって周りを戸惑わせることがある','熱しやすく冷めやすい','勢いで動いて後悔することがある'],
    parents:'気分のムラを責めないでください。熱が冷めた時期は次の爆発のための充電期間です。「またやる気なくなったの」ではなく「充電中だね」と声をかけてあげてください。'},
  'BT':{ name:'ステラ', emoji:'⭐', axis:'両方 × 論理', catchcopy:'いつもそこにいるあなたの光は最も遠くまで届く。', imgUrl:'https://hatarakutanukichi.github.io/cosmo-type/images/stella.PNG',
    talent:'流行に飛びつく人が多い中、あなたは本当に必要な変化を選んでいる。ぶれない軸と全体を見渡す力で、いつのまにか「その道のプロ」になれるのがあなたです。',
    strengths:['全体を見渡して落ち着いて判断できる','ぶれない軸で周りの道しるべになれる','長い目で物事を考えられる'],
    pitfalls:['見渡しすぎて自分の気持ちを見失うことがある','変化を好まず、今のままでいようとしすぎることがある','気持ちを表現するのが苦手で誤解されることがある'],
    parents:'急かさないでください。この子はじっくり考えてから動くタイプです。結果が出るまでに時間がかかっても、長い目で見守ることがこの子の力を最大限に引き出します。'},
  'BB':{ name:'コスモ', emoji:'🌍', axis:'両方 × 両方', catchcopy:'あなたの中に、宇宙がある。', imgUrl:'https://hatarakutanukichi.github.io/cosmo-type/images/cosmo.PNG',
    talent:'「何をしようかな」と悩むことが多いかもしれません。それは、やりたいことがないからではなく、どれを形にしようか悩んでいるから。気持ちも考えも、内も外も全部使いこなせるコスモタイプは、誰よりもたくさんのアイデアを持っています。何でもできるからこそ、何をするか自分で決めることが大事。あなたが決めた瞬間、その力は解放されます。',
    strengths:['どんな人とも自然につながれる','気持ちも考えも内も外も全部使いこなせる','決まったやり方じゃないアイデアが出せる'],
    pitfalls:['何でもできるゆえに何をすべきかわからなくなることがある','広げすぎて一つに集中できなくなることがある','共感しすぎて自分を見失うことがある'],
    parents:'「何でもできるね」で終わらせないでください。この子は可能性が広すぎて何をすべきか迷っています。「あなたは何が一番好き？」と問いかけて、一つに絞る手助けをしてあげてください。'}
};

let currentQ = 0;
let scores = { EI: [], FT: [], SE: null, SP: null };
const totalQ = questions.length;

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progressLabel').textContent = `Q ${currentQ + 1} / ${totalQ}`;
  document.getElementById('progressFill').style.width = `${((currentQ+1)/totalQ)*100}%`;
  document.getElementById('questionNumber').textContent = `QUESTION ${String(currentQ+1).padStart(2,'0')}`;
  document.getElementById('questionText').textContent = q.text;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    if (opt.soft) {
      btn.className = 'option-btn-c';
      btn.innerHTML = `<span class="option-label-c">${opt.label}</span>${opt.text}`;
    } else {
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-label">${opt.label}</span>${opt.text}`;
    }
    btn.onclick = () => selectOption(opt.value);
    container.appendChild(btn);
  });
  if (currentQ > 0) {
    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.textContent = '← 前の質問に戻る';
    backBtn.onclick = () => goBack();
    container.appendChild(backBtn);
  }
}

function goBack() {
  currentQ--;
  const q = questions[currentQ];
  if (q.axis === 'EI') scores.EI.pop();
  else if (q.axis === 'FT') scores.FT.pop();
  else if (q.axis === 'SE') scores.SE = null;
  else if (q.axis === 'SP') scores.SP = null;
  renderQuestion();
}

function selectOption(value) {
  const q = questions[currentQ];
  if (q.axis === 'EI') scores.EI.push(value);
  else if (q.axis === 'FT') scores.FT.push(value);
  else if (q.axis === 'SE') scores.SE = value;
  else if (q.axis === 'SP') scores.SP = value;
  currentQ++;
  if (currentQ < questions.length) renderQuestion();
  else showResult();
}

function getTypeKey() {
  let eiE = 0, eiI = 0;
  scores.EI.forEach(v => {
    if (v === 'E') eiE += 1;
    else if (v === 'I') eiI += 1;
  });
  let ei = 'B';
  if (eiE > eiI) ei = 'E';
  else if (eiI > eiE) ei = 'I';

  let ftF = 0, ftT = 0;
  scores.FT.forEach(v => {
    if (v === 'F') ftF += 1;
    else if (v === 'T') ftT += 1;
  });
  let ft = 'B';
  if (ftF > ftT) ft = 'F';
  else if (ftT > ftF) ft = 'T';

  if (scores.SE === 'S' && scores.SP === 'T') {
    if (ft === 'T') ft = 'B';
  }
  if (scores.SE === 'S' && scores.SP === 'F') {
    if (ft === 'B') ft = 'F';
  }

  return ei + ft;
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const key = getTypeKey();
  const t = types[key] || types['BB'];

  const answerMap = { 'E':'a', 'I':'b', 'B':'c', 'F':'a', 'T':'b', 'S':'a', 'N':'b' };
  const eiLog = scores.EI.map(v => answerMap[v] || v);
  const ftLog = scores.FT.map(v => answerMap[v] || v);
  const seLog = scores.SE ? answerMap[scores.SE] : '-';
  const spLog = scores.SP ? answerMap[scores.SP] : '-';
  const answerLog = [...eiLog, ...ftLog, seLog, spLog].join('');

  const rs = document.getElementById('resultSection');
  rs.innerHTML = `
    <div class="type-header">
      <img src="${t.imgUrl}" alt="${t.name}" style="width:180px;height:180px;object-fit:contain;display:block;margin:0 auto 16px;filter:drop-shadow(0 0 20px rgba(201,168,76,0.4));">
      <div class="type-name">${t.name}</div>
      <div class="type-axis">${t.axis}</div>
      <div class="catchcopy">「${t.catchcopy}」</div>
      <div style="text-align:center;margin-top:16px;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:rgba(240,234,220,0.3);letter-spacing:2px;">あなたの回答：${answerLog}</div>
    </div>
    <div class="section-block">
      <div class="section-title"><span class="section-icon">🌟</span><span class="section-label">あなたの才能</span><div class="section-line"></div></div>
      <div class="content-box"><p>${t.talent}</p></div>
    </div>
    <div class="section-block">
      <div class="section-title"><span class="section-icon">✦</span><span class="section-label">得意なこと</span><div class="section-line"></div></div>
      <div class="content-box"><ul class="list-items">${t.strengths.map(s=>`<li>${s}</li>`).join('')}</ul></div>
    </div>
    <div class="section-block">
      <div class="section-title"><span class="section-icon">⚠️</span><span class="section-label">気をつけること</span><div class="section-line"></div></div>
      <div class="content-box"><ul class="list-items">${t.pitfalls.map(p=>`<li>${p}</li>`).join('')}</ul></div>
    </div>
    <div class="section-block">
      <div class="section-title"><span class="section-icon">👨‍👩‍👧</span><span class="section-label">保護者の方へ</span><div class="section-line"></div></div>
      <div class="parents-box"><p>${t.parents}</p></div>
    </div>
    <div class="survey-section">
      <p class="survey-text">診断はいかがでしたか？<br>大人版診断もぜひ試してみてください！</p>
      <a href="./diagnosis.html" class="retry-btn" style="display:block;padding:14px;border:1px solid rgba(201,168,76,0.3);color:var(--gold);text-decoration:none;text-align:center;letter-spacing:2px;font-family:'Noto Sans JP',sans-serif;font-size:13px;">大人版を試す ✦</a>
      <p class="notice-text">
        ※この診断は娯楽目的のものであり、医療・心理・法律等の専門的アドバイスではありません。<br>
        ※お子さんの性格は成長とともに変化します。結果はあくまで参考としてお楽しみください。
      </p>
      <button class="retry-btn" onclick="resetQuiz()">もう一度診断する</button>
      <a href="./index.html" style="display:block;margin-top:8px;text-align:center;font-size:11px;color:rgba(240,234,220,0.25);font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;text-decoration:none;">← TOPに戻る</a>
    </div>
  `;
  rs.classList.add('show');
}

function resetQuiz() {
  currentQ = 0;
  scores = { EI: [], FT: [], SE: null, SP: null };
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('resultSection').innerHTML = '';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
