<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0e1a;
  --text: #f0eadc;
  --gold: #c9a84c;
  --gold-light: #e8d08a;
  --muted: rgba(240,234,220,0.65);
  --card-bg: rgba(255,255,255,0.07);
  --border: rgba(201,168,76,0.3);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--d) ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: var(--o); }
  to { opacity: calc(var(--o) * 0.15); }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 48px 20px 80px;
}

.header { text-align: center; margin-bottom: 48px; animation: fadeUp 0.8s ease both; }
.logo {
  font-family: 'Cinzel', serif;
  font-size: clamp(24px, 6vw, 38px);
  color: var(--gold-light);
  letter-spacing: 6px;
  text-shadow: 0 0 40px rgba(201,168,76,0.4);
  margin-bottom: 12px;
}
.tagline {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
}
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.3;
}
.divider-icon { color: var(--gold); font-size: 16px; opacity: 0.7; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.quiz-section { animation: fadeUp 0.8s ease 0.2s both; }

.progress-bar { margin-bottom: 32px; }
.progress-label {
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
  font-family: 'Noto Sans JP', sans-serif;
  margin-bottom: 8px;
  text-align: center;
}
.progress-track { height: 2px; background: rgba(201,168,76,0.15); border-radius: 1px; overflow: hidden; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 1px;
  transition: width 0.5s ease;
}

.question-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 36px 28px;
  margin-bottom: 24px;
}
.question-number {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 16px;
  opacity: 0.8;
}
.question-text { font-size: 17px; line-height: 1.8; margin-bottom: 28px; color: var(--text); }

.options { display: flex; flex-direction: column; gap: 12px; }

.option-btn {
  padding: 14px 20px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s;
}
.option-btn:hover {
  border-color: rgba(201,168,76,0.7);
  background: rgba(201,168,76,0.08);
  color: var(--gold-light);
}
.option-btn:active {
  opacity: 1;
  background: transparent;
  border-color: rgba(201,168,76,0.3);
  color: var(--text);
}
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  display: block;
  margin-bottom: 4px;
  opacity: 0.8;
}

.option-btn-c {
  padding: 14px 20px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.2);
  color: rgba(240,234,220,0.5);
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
}
.option-btn-c:hover {
  border-color: rgba(240,234,220,0.25);
  color: rgba(240,234,220,0.65);
}
.option-btn-c:active {
  background: transparent;
  border-color: rgba(240,234,220,0.12);
  color: rgba(240,234,220,0.4);
}
.option-label-c {
  font-size: 10px;
  color: var(--gold);
  letter-spacing: 2px;
  font-family: 'Noto Sans JP', sans-serif;
  display: block;
  margin-bottom: 4px;
  opacity: 0.8;
}

.result-section { display: none; animation: fadeUp 1s ease both; }
.result-section.show { display: block; }

.type-header { text-align: center; margin-bottom: 40px; }
.type-emoji { font-size: 48px; display: block; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(201,168,76,0.5)); }
.type-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px, 7vw, 42px);
  color: var(--gold-light);
  letter-spacing: 4px;
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
  margin-bottom: 12px;
}
.type-axis { font-size: 11px; color: var(--muted); letter-spacing: 3px; font-family: 'Noto Sans JP', sans-serif; margin-bottom: 20px; }
.catchcopy {
  font-size: 15px;
  color: var(--gold-light);
  line-height: 1.9;
  padding: 20px 24px;
  border-left: 2px solid rgba(201,168,76,0.5);
  background: rgba(201,168,76,0.06);
  margin: 0 auto;
  max-width: 500px;
  text-align: left;
}

.section-block { margin-bottom: 28px; }
.section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.section-icon { font-size: 18px; }
.section-label { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 3px; }
.section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,168,76,0.3), transparent); }

.content-box {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-left: 2px solid rgba(201,168,76,0.4);
  padding: 20px 24px;
}
.content-box p { font-size: 14px; line-height: 2.2; color: var(--text); font-weight: 300; }

.list-items { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.list-items li { font-size: 14px; line-height: 1.8; color: var(--text); padding-left: 16px; position: relative; }
.list-items li::before { content: '✦'; position: absolute; left: 0; color: var(--gold); font-size: 10px; top: 4px; opacity: 0.7; }

.survey-section { text-align: center; margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(201,168,76,0.15); }
.survey-text { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 2; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; }
.survey-btn {
  display: inline-block;
  padding: 14px 32px;
  background: transparent;
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.3s;
}
.survey-btn:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

.back-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  background: transparent;
  border: 1px solid rgba(240,234,220,0.1);
  color: rgba(240,234,220,0.3);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
}
.back-btn:hover { border-color: rgba(240,234,220,0.25); color: rgba(240,234,220,0.55); }

.retry-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  background: transparent;
  border: 1px solid rgba(240,234,220,0.1);
  color: rgba(240,234,220,0.35);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
}
.retry-btn:hover { border-color: rgba(240,234,220,0.3); color: rgba(240,234,220,0.6); }

.footer { text-align: center; margin-top: 60px; font-size: 11px; color: rgba(240,234,220,0.2); letter-spacing: 2px; font-family: 'Noto Sans JP', sans-serif; }
</style>
</head>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 100; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() < 0.2 ? 3 : 2;
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${2+Math.random()*4}s;--o:${0.2+Math.random()*0.6};animation-delay:${Math.random()*4}s;`;
  starsEl.appendChild(s);
}

const questions = [
  { text: '疲れ切ったエネルギーが回復するのは？', axis: 'EI',
    options: [
      { label:'A', text:'人と話した後、元気になる', value:'E' },

      { label:'C', text:'どちらも同じくらい必要', value:'B', soft: true }
    ]},
  { text: '忙しくて自分の時間が全然取れない日が続いた時、一番しんどいのは？', axis: 'EI',
    options: [
      { label:'A', text:'人と関わる時間が足りないこと', value:'E' },
      { label:'B', text:'一人になれる時間が足りないこと', value:'I' }
    ]},
  { text: '初めて会った人と、楽しく話せた日の帰り道、自分の気持ちは？', axis: 'EI',

  { text: '辛いことがあった時、自然とどうしたくなる？', axis: 'EI',

      { label:'A', text:'外に出たい・体を動かしたい・発散したい', value:'E' },
      { label:'B', text:'一人静かにいたい・内にこもりたい', value:'I' }
    ]},
  { text: '仲のいい友人が明らかに間違った判断をしようとしている。あなたが先に気づいた時、どうしたい？', axis: 'FT',
    options: [
      { label:'A', text:'傷つけないように、そっと気持ちに寄り添う', value:'F' },
      { label:'B', text:'間違いをはっきり伝える', value:'T' },
      { label:'C', text:'相手の気持ちを聞きながら、正しい方向に導く', value:'B', soft: true }
    ]},
  { text: '誰かと意見が違ったとき、自分の中で一番気になるのは？', axis: 'FT',
    options: [
      { label:'A', text:'相手が気分を悪くしていないか', value:'F' },
      { label:'B', text:'どちらの主張が正しいか', value:'T' },
      { label:'C', text:'両方同じくらい気になる', value:'B', soft: true }
    ]},
  { text: '何かを決断するとき、自分の核にあるのは？', axis: 'FT',
    options: [
      { label:'A', text:'関わる人が幸せかどうか', value:'F' },
      { label:'B', text:'論理的に正しいかどうか', value:'T' },

    ]},
  { text: '迷いが続くとき、最後に背中を押すのは？', axis: 'FT',
    options: [
      { label:'A', text:'「これが自分らしい」という感覚', value:'F' },
      { label:'B', text:'「これが筋が通っている」という確信', value:'T' },
      { label:'C', text:'感覚と確信が重なった瞬間', value:'B', soft: true }
    ]},
  { text: '場の空気や人の気持ちの変化に気づくのは？', axis: 'SE',
    options: [
      { label:'A', text:'自分でも驚くくらい敏感に気づく', value:'S' },
      { label:'B', text:'言われてから気づくことが多い', value:'N' }

  { text: '誰かの感情や場の空気を感じ取ったとき、自然にしていることは？', axis: 'SP',
    options: [
      { label:'A', text:'そのまま一緒に感じる・そっと寄り添う', value:'F' },
      { label:'B', text:'「なぜそう感じているのか」を考え始める', value:'T' }

const types = {
  'EF':{ name:'ソレイユ', emoji:'🌞', axis:'外向き × 感情', catchcopy:'太陽は、ただそこにいるだけで世界を照らす。', noteUrl:'https://note.com/vast_serval546/n/n7e711c10dafd', imgUrl:'https://hatarakutanukichi.github.io/cosmo-type/images/soleil.PNG',
    strengths:['その場にいるだけで空気が明るくなる','感情を素直に表現できる','喜びを周りに伝染させる力がある'],
    pitfalls:['感情が先走って後で後悔しやすい','誰にでも好かれようとして消耗する','人の反応に一喜一憂しすぎる'],
    talent:'「おしゃべりすぎかな」「感情的すぎるかな」と感じたことはありませんか。実はそのおしゃべりと感情表現こそが、ビジネスで最も希少なスキルです。人を集め、その場を温め、また来たいと思わせる——これができる人はそう多くない。接客、イベント、SNS発信、コミュニティ運営——「人が集まる場所」を作ることがあなたの才能の本領です。あなたが「ただ楽しくやってるだけ」と思っていることが、他の人には真似できないビジネスの核になります。',
    env:'人と関わることが多い環境、チームで動く仕事、誰かのために何かをする場面。一人で黙々と作業するより、反応がもらえる環境の方が力が出ます。オンラインより対面、静かな場所より少し賑やかな場所の方が本領発揮できます。',
    recovery:'疲れた時ほど一人になろうとしがちですが、ソレイユタイプは信頼できる人と話すことで回復します。感情を吐き出せる場所を一つ持っておくと、消耗しにくくなります。',
    avoid:'感情を抑えて「いい人」を演じ続けること。無理に感情を押し込めると、エネルギーが行き場を失い突然爆発したり深く落ち込んだりします。嫌なことは早めに小出しにする習慣が、長く輝き続けるコツです。'},
  'ET':{ name:'フォルゴレ', emoji:'⚡', axis:'外向き × 論理', catchcopy:'あなたの言葉には、根拠という名の力がある。', noteUrl:'https://note.com/vast_serval546/n/na601247c09d2', imgUrl:'https://hatarakutanukichi.github.io/cosmo-type/images/folgore.PNG',
    strengths:['考えてから動くのではなく、動きながら考えられる','目標を決めたら迷わず進める','複雑な状況でも冷静に判断できる'],
    pitfalls:['正論すぎて相手の気持ちを置き去りにする','弱さを見せるのが苦手','完璧を求めすぎて周りを疲弊させる'],
    talent:'共感より先に「なぜ？」「どうすれば？」が出てしまう——そう感じたことはありませんか。でもその瞬発的な論理思考は、誰かがやらなければいけない役割です。みんなが感情で動いている場面で、あなただけが冷静に本質を見ている。そのズレが時に「冷たい」と映ることもあるけれど、チームに必ず一人必要な人間がいるとしたら、それはあなたです。投資、リスク管理、危機対応、意思決定——感情に流されず判断できる人を、世界は常に求めています。',
    env:'明確な目標がある環境、結果が数字で見える仕事、自分でペースを決められる場面。ルールや仕組みを自分で作れる環境が最も輝けます。',
    recovery:'疲れた時こそ一人で静かに過ごす時間が必要です。体を動かす、本を読む、一人で考えをまとめる——インプットの時間が回復につながります。',
    avoid:'正しさを押しつけること。「正しいかどうか」より「相手に届くかどうか」を意識するだけで、あなたの力は何倍にもなります。'},
  'EB':{ name:'ルミナ', emoji:'✨', axis:'外向き × 両方', catchcopy:'あなたは光。当たる角度で、違う色を見せる。', noteUrl:'https://note.com/vast_serval546/n/n7e660afe248d', imgUrl:'https://hatarakutanukichi.github.io/cosmo-type/images/lumia.PNG',
    strengths:['どんな場所でも自分らしくいられる','感情と論理を状況で使い分けられる','多様な人と深く関われる'],
    pitfalls:['柔軟すぎて自分の軸がぼやけることがある','八方美人に見られやすい','全方向に気を使いすぎて疲れる'],
    talent:'「どっちつかず」「自分がない」と言われたことはありませんか。でもそれは、あなたが誰よりも多くの情報を持っているからです。感情が湧いた瞬間に処理して、その場に合った言葉と態度に変換できる——それがルミナタイプの才能です。おおらかに見えるのは感情がないからではありません。感情を受け取った瞬間に蓋をして、最適な形で出しているから。感情タイプの気持ちも、論理タイプの正しさも、両方受け取れるルミナタイプは、その場で唯一「全体地図」を持っている人。誰も気づかない妥協点を見つけられる。その力が、プロジェクトを円滑に進め、チームの成功率を上げる決定打になります。',
    env:'多様な人と関われる環境、役割が固定されていない仕事。状況に応じて動ける場所の方が本領発揮できます。',
    recovery:'全方向に気を使いすぎて消耗するのがルミナタイプ。「今日は誰にも合わせない」と決める時間を意識的に作ることが大切です。',
    avoid:'全員に好かれようとすること。「この人には好かれなくていい」と決める勇気が、逆にあなたの魅力を際立たせます。'},
  'IF':{ name:'セレーナ', emoji:'🌙', axis:'内向き × 感情', catchcopy:'あなたの優しさは、どこまでも深く届く。', noteUrl:'https://note.com/vast_serval546/n/n43565cc141c5', imgUrl:'https://hatarakutanukichi.github.io/cosmo-type/images/selena.PNG',
    strengths:['言葉にならない気持ちを察することができる','繊細だからこその優しさで人を包める','そこにいるだけで安心感を与えられる'],

    talent:'「いつも自分だけしんどい」と感じることはありませんか。それはあなたが、他の人には受け取れない信号を受け取っているからです。言葉にならない誰かの痛み、場の微妙な違和感——それを誰より先に察知できる。その感性は、直接誰かと向き合い続けると消耗しますが、作品・言葉・サービス・商品に変換したときに本領を発揮します。あなたが作ったものを受け取った人は「これ、私のことだ」と感じます。一対一で会わなくても、一対一のように届く——それがセレーナタイプの才能です。',
    env:'一対一の関係、少人数、自分のペースで動ける環境。深く関われる仕事ほど輝けます。',

let currentQ = 0;
let scores = { EI: [], FT: [], SE: null, SP: null };
const totalQ = questions.length;

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('progressLabel').textContent = `Q ${currentQ + 1} / ${totalQ}`;
  document.getElementById('progressFill').style.width = `${((currentQ+1)/totalQ)*100}%`;
  document.getElementById('questionNumber').textContent = `QUESTION ${String(currentQ+1).padStart(2,'0')}`;
  document.getElementById('questionText').textContent = q.text;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    if (opt.soft) {
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-label">${opt.label}</span>${opt.text}`;
    } else {
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-label">${opt.label}</span>${opt.text}`;
    }
    btn.onclick = () => selectOption(opt.value);
    container.appendChild(btn);
  });
  // 戻るボタン（1問目以外に表示）
  if (currentQ > 0) {
    const backBtn = document.createElement('button');
    backBtn.className = 'back-btn';
    backBtn.textContent = '← 前の質問に戻る';
    backBtn.onclick = () => goBack();
    container.appendChild(backBtn);
  }
}

function goBack() {
  currentQ--;
  const q = questions[currentQ];
  // 直前の回答を取り消す
  if (q.axis === 'EI') scores.EI.pop();
  else if (q.axis === 'FT') scores.FT.pop();
  else if (q.axis === 'SE') scores.SE = null;
  else if (q.axis === 'SP') scores.SP = null;
  renderQuestion();
}

function selectOption(value) {
  const q = questions[currentQ];
  if (q.axis === 'EI') scores.EI.push(value);
  else if (q.axis === 'FT') scores.FT.push(value);
  else if (q.axis === 'SE') scores.SE = value;
  else if (q.axis === 'SP') scores.SP = value;
  currentQ++;
  if (currentQ < questions.length) renderQuestion();
  else showResult();
}

function getTypeKey() {
  let eiE = 0, eiI = 0;
  scores.EI.forEach(v => {
    if (v === 'E') eiE += 1;
    else if (v === 'I') eiI += 1;
  });
  let ei = 'B';
  if (eiE > eiI) ei = 'E';
  else if (eiI > eiE) ei = 'I';

  let ftF = 0, ftT = 0;
  scores.FT.forEach(v => {
    if (v === 'F') ftF += 1;
    else if (v === 'T') ftT += 1;
  });
  let ft = 'B';
  if (ftF > ftT) ft = 'F';
  else if (ftT > ftF) ft = 'T';

  // 補正：感情感度が高い（SE=S）かつ感情を論理で処理する（SP=T）場合
  // IT→IB（アビッソ）、ET→EB（ルミナ）に補正
  if (scores.SE === 'S' && scores.SP === 'T') {
    if (ft === 'T') ft = 'B';
  }
  // 感情感度が高い（SE=S）かつそのまま感じる（SP=F）場合
  // IBになりそうな人をIF（セレーナ）寄りに補正
  if (scores.SE === 'S' && scores.SP === 'F') {
    if (ft === 'B') ft = 'F';
  }

  return ei + ft;
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const key = getTypeKey();
  const t = types[key] || types['BB'];

  // 回答ログ生成
  const answerMap = { 'E':'A', 'I':'B', 'B':'C', 'F':'A', 'T':'B', 'S':'A', 'N':'B' };

    </div>

      <p style="font-size:11px;color:rgba(240,234,220,0.4);font-family:'Noto Sans JP',sans-serif;line-height:1.8;margin-top:16px;text-align:left;">
        ※noteの記事で購入できます。<br>
        「購入手続きへ」→「ゲストとして購入」を選択し、メールアドレスとクレジットカードまたはPayPayで決済できます。
      </p>
      <a href="https://www.amazon.co.jp/dp/B0GX2XW1QQ" target="_blank" class="survey-btn" style="margin-top:16px;background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.5);">📚 全タイプの結果が読める Kindle はこちら<br><span style="font-size:10px;opacity:0.7;">5/18発売 ¥1,250</span></a>
      <a href="https://forms.gle/uBBmiDcGmcjSc12a7" target="_blank" class="survey-btn" style="margin-top:12px;font-size:12px;opacity:0.7;">アンケートに答える</a>
      <button class="retry-btn" onclick="resetQuiz()">もう一度診断する</button>
      <a href="./index.html" style="display:block;margin-top:8px;text-align:center;font-size:11px;color:rgba(240,234,220,0.25);font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;text-decoration:none;">← TOPに戻る</a>
    </div>
  `;
  rs.classList.add('show');
}

function resetQuiz() {
  currentQ = 0;
  scores = { EI: [], FT: [], SE: null, SP: null };
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('resultSection').innerHTML = '';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
}

renderQuestion();
</script>
